; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

; ── Base environment ──────────────────────────────────────────────────────────
[env]
monitor_speed = 115200

; ── Shared settings ──────────────────────────────────────────────────────────
[common]
lib_deps =
	microStore=symlink://../..
build_unflags =
	-std=gnu++11
build_flags =
	-std=gnu++14
    -I src

[env:native]
platform = native
build_unflags =
    ${common.build_unflags}
build_flags =
    ${common.build_flags}
    -DPLATFORM_NATIVE
    -DUSTORE_USE_UNIVERSALFS
	-DPATH_TABLE_MAX_RECS=2000
	-DPATH_TABLE_SEGMENT_SIZE=98304 ; 96 KB
	-DPATH_TABLE_SEGMENT_COUNT=8
lib_deps =
	${common.lib_deps}
lib_compat_mode = off

[env:ttgo-lora32-v21]
framework = arduino
platform = espressif32
board = ttgo-lora32-v21
upload_speed = 460800
board_build.partitions = no_ota.csv
board_build.filesystem = littlefs
build_unflags =
    ${common.build_unflags}
build_flags =
    ${common.build_flags}
    -DPLATFORM_ESP32
    -DUSTORE_USE_UNIVERSALFS
	-DPATH_TABLE_MAX_RECS=500
	-DPATH_TABLE_SEGMENT_SIZE=24576 ; 24 KB
	-DPATH_TABLE_SEGMENT_COUNT=8
lib_deps =
    ${common.lib_deps}
monitor_filters = esp32_exception_decoder

[env:ttgo-lora32-v21-sd]
framework = arduino
platform = espressif32
board = ttgo-lora32-v21
upload_speed = 460800
board_build.partitions = no_ota.csv
board_build.filesystem = littlefs
build_unflags =
    ${common.build_unflags}
build_flags =
    ${common.build_flags}
    -DPLATFORM_ESP32
    -DUSTORE_USE_SD
	-DSDCARD_SCLK=14
	-DSDCARD_MISO=2
	-DSDCARD_MOSI=15
	-DSDCARD_CS=13
	;-DPATH_TABLE_MAX_RECS=500
	-DPATH_TABLE_MAX_RECS=1000
	;-DPATH_TABLE_SEGMENT_SIZE=24576 ; 24 KB
	-DPATH_TABLE_SEGMENT_SIZE=49152 ; 48 KB
	-DPATH_TABLE_SEGMENT_COUNT=8
lib_deps =
    ${common.lib_deps}
monitor_filters = esp32_exception_decoder

; ── Heltec WiFi LoRa 32 V3 (ESP32-S3, 8 MB flash) ───────────────────────────
[env:heltec_wifi_lora_32_V3]
framework = arduino
platform = espressif32
; Use the pioarduino fork for Arduino Core 3.x / ESP-IDF 5.x support
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.07/platform-espressif32.zip
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
; Very stable
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21-2/platform-espressif32.zip
; Latest stable
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.32/platform-espressif32.zip
board = heltec_wifi_lora_32_V3
;board_build.partitions = partitions_esp32.csv
board_build.partitions = no_ota.csv
board_upload.flash_size = 8MB
board_build.filesystem = littlefs
build_unflags =
    ${common.build_unflags}
build_flags =
    ${common.build_flags}
    -DPLATFORM_ESP32
    -DARDUINO_USB_CDC_ON_BOOT=1   ; redirect Serial → USB CDC
    -DUSTORE_USE_UNIVERSALFS
	-DPATH_TABLE_MAX_RECS=2000
	-DPATH_TABLE_SEGMENT_SIZE=98304 ; 96 KB
	-DPATH_TABLE_SEGMENT_COUNT=8
lib_deps =
    ${common.lib_deps}
monitor_filters = esp32_exception_decoder

; ── Heltec WiFi LoRa 32 V34 (ESP32-S3, 8 MB flash) ───────────────────────────
; NOTE: PlatformIO has no V4 board definition yet (as of early 2026).
; We use heltec_wifi_lora_32_V3 — identical ESP32-S3 chip; only flash size
; differs (V3 = 8 MB, V4 = 16 MB).  For V4, additionally override:
;   board_upload.flash_size  = 16MB
;   board_build.partitions   = partitions_esp32_16mb.csv
; ─────────────────────────────────────────────────────────────────────────────
[env:heltec_wifi_lora_32_V4]
framework = arduino
platform = espressif32
; Use the pioarduino fork for Arduino Core 3.x / ESP-IDF 5.x support
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.07/platform-espressif32.zip
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
; Very stable
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21-2/platform-espressif32.zip
; Latest stable
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.32/platform-espressif32.zip
board = esp32-s3-devkitc-1
;board_build.partitions = partitions_esp32.csv
board_build.partitions = no_ota.csv
board_upload.flash_size = 16MB
board_build.filesystem = littlefs
build_unflags =
    ${common.build_unflags}
build_flags =
    ${common.build_flags}
    -DPLATFORM_ESP32
    -DARDUINO_USB_CDC_ON_BOOT=1   ; redirect Serial → USB CDC
    -DUSTORE_USE_UNIVERSALFS
	-DPATH_TABLE_MAX_RECS=2000
	-DPATH_TABLE_SEGMENT_SIZE=98304 ; 96 KB
	-DPATH_TABLE_SEGMENT_COUNT=8
lib_deps =
    ${common.lib_deps}
monitor_filters = esp32_exception_decoder

; ── WisBlock Core RAK4631 (nRF52840, 1 MB flash) ──────────────────
; NOTE: "rak4630" is the bare module.  The correct PlatformIO board ID for the
; WisBlock Core that carries it is "wiscore_rak4631" (Adafruit nRF52 BSP).
; Suggested flash layout (nRF52840):
;   0x00000 – 0x25FFF  SoftDevice S140 (152 KB)
;   0x26000 – 0xCFFFF  Application (680 KB, plenty for a demo)
;   0xD0000 – 0xEFFFF  Storage partition (128 KB / 32 × 4 KB sectors) ← here
;   0xF0000 – 0xF3FFF  gap
;   0xF4000 – 0xFEFFF  UF2 bootloader (44 KB)
;   0xFF000 – 0xFFFFF  Bootloader settings (4 KB)
; ─────────────────────────────────────────────────────────────────────────────
[env:wiscore_rak4631]
framework = arduino
platform = nordicnrf52
;board = wiscore_rak4631
board = rak4630
board_build.variants_dir = variants
board_build.variant = rak4630
board_build.partitions = no_ota.csv
build_unflags =
    ${common.build_unflags}
build_flags =
    ${common.build_flags}
    -DPLATFORM_NRF52
    -DUSTORE_USE_UNIVERSALFS
	-DPATH_TABLE_MAX_RECS=25
	-DPATH_TABLE_SEGMENT_SIZE=2048 ; 2 KB
	-DPATH_TABLE_SEGMENT_COUNT=6
lib_deps =
    ${common.lib_deps}

; ── WisBlock Core RAK4631 (nRF52840, 1 MB flash) ──────────────────
[env:wiscore_rak4631_rak15001]
framework = arduino
platform = nordicnrf52
board = rak4630
board_build.variants_dir = variants
board_build.variant = rak4630
board_build.partitions = no_ota.csv
build_unflags =
    ${common.build_unflags}
build_flags =
    ${common.build_flags}
    -DLFS_NO_ASSERT
    -DPLATFORM_NRF52
    -DUSTORE_USE_INTERNALFS
    -DUSTORE_USE_FLASHFS
    -DUSTORE_USE_UNIVERSALFS
	-DPATH_TABLE_MAX_RECS=500
	;-DPATH_TABLE_MAX_RECS=1000
	-DPATH_TABLE_SEGMENT_SIZE=24576 ; 24 KB
	;-DPATH_TABLE_SEGMENT_SIZE=49152 ; 48 KB
	-DPATH_TABLE_SEGMENT_COUNT=8
lib_deps =
    ${common.lib_deps}
    adafruit/SdFat - Adafruit Fork
    https://github.com/attermann/Adafruit_SPIFlash#littlefs
